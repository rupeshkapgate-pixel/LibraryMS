name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/lms
  PYTHON_VER: "3.11"
  NODE_VER: "20"
  PROTOBUF_VER: "5.29.5"
  GRPCIO_VER: "1.71.0"
  GRPCIO_TOOLS_VER: "1.71.0"

permissions:
  contents: read

jobs:
  # ── Python Lint ─────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}

      - name: Install Ruff
        run: python -m pip install --upgrade ruff

      - name: Lint Python services
        run: |
          python -m ruff check services/ \
            --ignore E501,E402 \
            --exclude "*/proto_generated/*" \
            --exclude "*/grpc_clients/*"

  # ── Frontend Lint ───────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # package-lock.json is committed, so npm cache is safe and deterministic.
      - name: Setup Node with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci --legacy-peer-deps

      # Do not pass --cache to next lint.
      # next lint in Next.js 14 does not support ESLint CLI cache flags.
      - name: Lint frontend
        working-directory: services/frontend
        run: npm run lint

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: |
          python -m pip install pytest pytest-asyncio anyio

      - name: Install service dependencies
        run: |
          for svc in book-service member-service lending-service api-gateway; do
            python -m pip install -r services/$svc/requirements.txt
          done

      # Reinstall pinned versions after service requirements because service deps
      # may otherwise downgrade protobuf and break generated *_pb2.py imports.
      - name: Install pinned protobuf/gRPC tooling
        run: |
          python -m pip install --upgrade --force-reinstall \
            protobuf==${{ env.PROTOBUF_VER }} \
            grpcio==${{ env.GRPCIO_VER }} \
            grpcio-tools==${{ env.GRPCIO_TOOLS_VER }}
          python -c "import google.protobuf; print('protobuf', google.protobuf.__version__)"
          python -m grpc_tools.protoc --version

      - name: Generate protobuf artifacts
        run: bash scripts/generate_proto.sh

      - name: Verify generated protobuf artifacts
        run: |
          test -f services/book-service/app/proto_generated/book_pb2.py
          test -f services/member-service/app/proto_generated/member_pb2.py
          test -f services/lending-service/app/proto_generated/lending_pb2.py
          test -f services/api-gateway/app/grpc_clients/proto_generated/book_pb2.py

      - name: Test api-gateway
        run: pytest services/api-gateway/tests/ -v --tb=short

      - name: Test book-service
        run: pytest services/book-service/tests/ -v --tb=short

      - name: Test member-service
        run: pytest services/member-service/tests/ -v --tb=short

      - name: Test lending-service
        run: pytest services/lending-service/tests/ -v --tb=short

  # ── Frontend Build ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci --legacy-peer-deps

      - name: Build Next.js
        working-directory: services/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  docker-build:
    name: Docker — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: book-service,    dockerfile: services/book-service/Dockerfile,    context: . }
          - { name: member-service,  dockerfile: services/member-service/Dockerfile,  context: . }
          - { name: lending-service, dockerfile: services/lending-service/Dockerfile, context: . }
          - { name: api-gateway,     dockerfile: services/api-gateway/Dockerfile,     context: . }
          - { name: frontend,        dockerfile: Dockerfile,                          context: services/frontend }

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Trivy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        service: [book-service, member-service, lending-service, api-gateway, frontend]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest"
          format: sarif
          output: "trivy-${{ matrix.service }}.sarif"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ matrix.service }}-sarif
          path: "trivy-${{ matrix.service }}.sarif"
          if-no-files-found: warn
