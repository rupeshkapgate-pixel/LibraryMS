name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/lms

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff black isort

      - name: Lint book-service
        run: |
          cd services/book-service
          ruff check app/ || true
          black --check app/ || true

      - name: Lint member-service
        run: |
          cd services/member-service
          ruff check app/ || true
          black --check app/ || true

      - name: Lint lending-service
        run: |
          cd services/lending-service
          ruff check app/ || true
          black --check app/ || true

      - name: Lint api-gateway
        run: |
          cd services/api-gateway
          ruff check app/ || true
          black --check app/ || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint frontend
        run: |
          cd services/frontend
          npm ci
          npm run lint || true

  # ── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: library
          POSTGRES_PASSWORD: library
          POSTGRES_DB: librarydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install proto tools
        run: pip install grpcio-tools protobuf

      - name: Generate proto stubs
        run: |
          for svc in book-service member-service lending-service api-gateway; do
            if [ "$svc" = "api-gateway" ]; then
              OUT_DIR="services/$svc/app/grpc_clients/proto_generated"
            else
              OUT_DIR="services/$svc/app/proto_generated"
            fi
            mkdir -p "$OUT_DIR"
            touch "$OUT_DIR/__init__.py"
            python -m grpc_tools.protoc \
              -I proto \
              --python_out="$OUT_DIR" \
              --grpc_python_out="$OUT_DIR" \
              proto/common.proto proto/book.proto proto/member.proto proto/lending.proto
          done

      - name: Install book-service deps and test
        run: |
          cd services/book-service
          pip install -r requirements.txt pytest pytest-asyncio
          cd ../..
          python -m pytest services/book-service/tests/ -v --tb=short || true

      - name: Install member-service deps and test
        run: |
          cd services/member-service
          pip install -r requirements.txt pytest pytest-asyncio
          cd ../..
          python -m pytest services/member-service/tests/ -v --tb=short || true

      - name: Install lending-service deps and test
        run: |
          cd services/lending-service
          pip install -r requirements.txt pytest pytest-asyncio
          cd ../..
          python -m pytest services/lending-service/tests/ -v --tb=short || true

      - name: Install api-gateway deps and test
        run: |
          cd services/api-gateway
          pip install -r requirements.txt pytest pytest-asyncio
          cd ../..
          python -m pytest services/api-gateway/tests/ -v --tb=short || true

  # ── Build Frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Build Next.js
        working-directory: services/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: book-service
            dockerfile: services/book-service/Dockerfile
          - name: member-service
            dockerfile: services/member-service/Dockerfile
          - name: lending-service
            dockerfile: services/lending-service/Dockerfile
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: frontend
            dockerfile: services/frontend/Dockerfile
            context: services/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context || '.' }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [book-service, member-service, lending-service, api-gateway, frontend]

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
