name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ${{ github.repository_owner }}/lms
  PYTHON_VER:    "3.11"
  NODE_VER:      "20"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
      - run: pip install ruff
      - name: Lint all services
        run: |
          for svc in book-service member-service lending-service api-gateway; do
            echo "--- ruff: $svc ---"
            ruff check services/$svc/app/ --ignore E501,E402
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
      - run: npm install --legacy-peer-deps
        working-directory: services/frontend
      - run: npm run lint
        working-directory: services/frontend

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}

      - name: Install proto tools + generate stubs
        run: |
          pip install grpcio-tools protobuf
          bash scripts/generate_proto.sh

      - name: Install all service dependencies
        run: |
          pip install pytest pytest-asyncio
          for svc in book-service member-service lending-service api-gateway; do
            pip install -r services/$svc/requirements.txt
          done

      - name: Run book-service tests
        run: pytest services/book-service/tests/ -v --tb=short

      - name: Run member-service tests
        run: pytest services/member-service/tests/ -v --tb=short

      - name: Run lending-service tests
        run: pytest services/lending-service/tests/ -v --tb=short

      - name: Run api-gateway tests
        run: pytest services/api-gateway/tests/ -v --tb=short

  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
      - run: npm install --legacy-peer-deps
        working-directory: services/frontend
      - run: npm run build
        working-directory: services/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Build & Push ────────────────────────────────────────────────────
  docker-build:
    name: Docker — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: book-service,    dockerfile: services/book-service/Dockerfile,    context: . }
          - { name: member-service,  dockerfile: services/member-service/Dockerfile,  context: . }
          - { name: lending-service, dockerfile: services/lending-service/Dockerfile, context: . }
          - { name: api-gateway,     dockerfile: services/api-gateway/Dockerfile,     context: . }
          - { name: frontend,        dockerfile: services/frontend/Dockerfile,        context: services/frontend }
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.service.context }}
          file:       ${{ matrix.service.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Trivy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: [book-service, member-service, lending-service, api-gateway, frontend]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest"
          format:         sarif
          output:         "trivy-${{ matrix.service }}.sarif"
          severity:       CRITICAL,HIGH
          ignore-unfixed: true
          exit-code:      "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
