apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: library-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: lms/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: BOOK_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: BOOK_SERVICE_HOST
            - name: BOOK_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: BOOK_SERVICE_PORT
            - name: MEMBER_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MEMBER_SERVICE_HOST
            - name: MEMBER_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MEMBER_SERVICE_PORT
            - name: LENDING_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: LENDING_SERVICE_HOST
            - name: LENDING_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: LENDING_SERVICE_PORT
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: ALLOWED_ORIGINS
            - name: GRPC_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: GRPC_TIMEOUT
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: library-system
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
