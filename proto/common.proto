syntax = "proto3";

package common;

option python_out = ".";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 page = 1;
  int32 page_size = 2;
  int32 total_count = 3;
  int32 total_pages = 4;
}

message EmptyRequest {}

message StatusResponse {
  bool success = 1;
  string message = 2;
}
